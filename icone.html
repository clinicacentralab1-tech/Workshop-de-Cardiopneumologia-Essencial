<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ícone WhatsApp Centralab Benguela</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        /* Cores exatas da marca */
        .bg-navy { background-color: #1e3a8a; }
        .text-navy { color: #1e3a8a; }
        .bg-red { background-color: #e31e24; }
        .text-red { color: #e31e24; }
        .text-light { color: #93c5fd; }
    </style>
</head>
<body>

    <!-- CAIXA DA IMAGEM (500x500px) - Faça screenshot deste quadrado! -->
    <div class="relative w-[500px] h-[500px] bg-navy overflow-hidden shadow-2xl flex flex-col items-center justify-center rounded-xl">
        
        <!-- Círculo guia invisível (Simula o corte redondo do WhatsApp) -->
        <div class="absolute w-[500px] h-[500px] rounded-full border-[15px] border-black/10 z-0"></div>
        
        <!-- Elementos decorativos (Ondas / Batimentos atrás) -->
        <i class="fas fa-wave-square absolute text-[300px] text-white opacity-5 -rotate-12 z-0"></i>

        <!-- CONTEÚDO PRINCIPAL (Seguro dentro do corte do WhatsApp) -->
        <div class="relative z-10 flex flex-col items-center text-center mt-2">
            
            <!-- Ícone Central (Coração com ECG) -->
            <div class="w-28 h-28 bg-white rounded-full flex items-center justify-center shadow-lg border-4 border-[#e31e24] mb-5 relative">
                <i class="fas fa-heartbeat text-5xl text-red"></i>
                <!-- Ponto pulsante decorativo -->
                <div class="absolute top-0 right-0 w-5 h-5 bg-red border-[3px] border-white rounded-full"></div>
            </div>

            <!-- Textos -->
            <h1 class="text-white text-[42px] leading-none font-black tracking-tighter mb-2">CENTRALAB</h1>
            
            <div class="bg-red text-white px-5 py-1.5 rounded-full font-bold tracking-widest uppercase text-xs shadow-md mb-4">
                Cardiopneumologia
            </div>
            
            <!-- Adição BENGUELA em destaque -->
            <div class="flex items-center gap-2 text-light text-xl font-black tracking-widest uppercase bg-white/10 px-5 py-2 rounded-xl border border-white/20 backdrop-blur-sm">
                <i class="fas fa-map-marker-alt text-red"></i> BENGUELA
            </div>
            
        </div>
    </div>

</body>
</html>
